<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-color-theme="gold">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传讯</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap');
        
        :root {
            --primary-bg: #f9f9f9;
            --secondary-bg: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #7a7a7a;
            --border-color: #ebebeb;
            --message-sent-text: #ffffff;
            --message-received-bg: #f0f0f0;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --font-family: 'Noto Serif SC', serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --font-size: 16px;
            --favorite-color: #ffc107;
            
            --primary-bg-rgb: 249, 249, 249;
            --secondary-bg-rgb: 255, 255, 255;
        }

        :root[data-color-theme="gold"] { --accent-color: #c5a47e; --accent-color-dark: #d4af37; }
        :root[data-color-theme="blue"] { --accent-color: #7FA6CD; --accent-color-dark: #7FA6CD; }
        :root[data-color-theme="purple"] { --accent-color: #BB9EC7; --accent-color-dark: #BB9EC7; }
        
        html[data-theme="dark"] {
            --primary-bg: #121212;
            --secondary-bg: #1e1e1e;
            --text-primary: #e5e5e5;
            --text-secondary: #8c8c8c;
            --border-color: #2f2f2f;
            --message-sent-text: #ffffff; 
            --message-received-bg: #2a2a2a;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            --favorite-color: #ffd700;
            
            --primary-bg-rgb: 18, 18, 18;
            --secondary-bg-rgb: 30, 30, 30;
        }
        
        html[data-theme="dark"][data-color-theme="gold"] .message-sent,
        html[data-theme="dark"][data-color-theme="blue"] .message-sent,
        html[data-theme="dark"][data-color-theme="purple"] .message-sent {
            color: #121212;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--primary-bg); 
            color: var(--text-primary); 
            transition: background-color 0.5s ease, color 0.5s ease; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            font-family: var(--font-family);
            font-weight: normal;
            position: relative;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            font-size: var(--font-size);
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 10px; 
            border-bottom: 1px solid var(--border-color); 
            background-color: var(--secondary-bg); 
            box-shadow: var(--shadow); 
            z-index: 10; 
            flex-shrink: 0; 
            position: relative;
            transition: background-color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }
        
        .header-motto {
            position: absolute; 
            top: 8px; 
            left: 0; 
            right: 0;
            text-align: center; 
            font-size: 12px; 
            color: var(--accent-color);
            font-weight: 500; 
            letter-spacing: 2px; 
            opacity: 0.8; 
            font-style: italic;
            transition: color 0.5s ease;
        }
        html[data-theme="dark"] .header-motto { color: var(--accent-color-dark); }
        
        .user-info { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 3px; 
            min-width: 50px;
        }
        .avatar { 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            object-fit: cover; 
            cursor: pointer; 
            background-color: var(--border-color); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-secondary); 
            border: 2px solid transparent; 
            transition: var(--transition); 
            order: 2; 
        }
        .avatar:hover { border-color: var(--accent-color); transform: scale(1.05); }
        html[data-theme="dark"] .avatar:hover { border-color: var(--accent-color-dark); }
        .avatar > img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .username { 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            transition: var(--transition); 
            order: 1; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70px;
        }
        .username:hover { color: var(--accent-color); }
        html[data-theme="dark"] .username:hover { color: var(--accent-color-dark); }
        .status { 
            font-size: 12px; 
            font-weight: 500; 
            color: var(--text-secondary); 
            cursor: pointer; 
            order: 3; 
            padding: 2px 6px; 
            border-radius: 6px; 
            transition: background-color 0.3s ease; 
            white-space: nowrap;
        }
        .status:hover { background-color: var(--message-received-bg); }
        
        .header-actions { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .action-btn { 
            background: none; 
            border: none; 
            color: var(--text-secondary); 
            font-size: 18px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            transition: var(--transition); 
        }
        .action-btn:hover { background-color: var(--message-received-bg); color: var(--text-primary); transform: rotate(15deg) scale(1.1); }
        
        .main-chat-area { 
            flex: 1; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 2px; 
            transition: background-color 0.5s ease; 
            background-color: transparent; 
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .chat-container::-webkit-scrollbar {
            display: none;
            width: 0;
        }
        
        .message-wrapper { 
            display: flex; 
            flex-direction: column; 
            max-width: 85%; 
            margin-bottom: 12px; 
            animation: messageAppear 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
            opacity: 0;
            transform: translateY(15px);
        }
        @keyframes messageAppear { 
            0% { opacity: 0; transform: translateY(15px); }
            70% { opacity: 1; transform: translateY(-3px); }
            100% { opacity: 1; transform: translateY(0); } 
        }
        
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }
        
        .message { 
            padding: 12px 18px; 
            border-radius: var(--radius); 
            word-wrap: break-word; 
            line-height: 1.5; 
            box-shadow: var(--shadow); 
            transition: background-color 0.5s ease, color 0.5s ease, box-shadow 0.5s ease; 
            position: relative;
            overflow: hidden;
        }
        
        .message-sent { 
            background-color: var(--accent-color); 
            color: var(--message-sent-text); 
            border-bottom-right-radius: 6px; 
        }
        html[data-theme="dark"] .message-sent { background-color: var(--accent-color-dark); }
        
        .message-received { 
            background-color: var(--message-received-bg); 
            color: var(--text-primary); 
            border-bottom-left-radius: 6px; 
        }
        
        .message-meta { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            margin: 6px 10px 0 10px; 
            opacity: 0;
            animation: fadeInMeta 0.3s ease 0.2s forwards;
        }
        @keyframes fadeInMeta {
            to { opacity: 0.7; }
        }
        
        .timestamp { 
            font-size: 11px; 
            font-weight: 500; 
            color: var(--text-secondary); 
            transition: color 0.5s ease; 
            text-shadow: 0 1px 1px rgba(0,0,0,0.1); 
        }
        .read-receipt { 
            font-size: 12px; 
            color: var(--text-secondary); 
        }
        .read-receipt.read { color: var(--accent-color); }
        html[data-theme="dark"] .read-receipt.read { color: var(--accent-color-dark); }
        
        /* --- 新增：收藏按钮样式 --- */
        .favorite-btn {
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            transform-origin: center;
        }
        .favorite-btn:hover {
            transform: scale(1.3);
            color: var(--favorite-color);
        }
        .favorite-btn.favorited {
            color: var(--favorite-color);
            transform: scale(1.1);
        }
        .favorite-btn.favorited:hover {
            transform: scale(1.3);
        }

        .input-area { 
            display: flex; 
            padding: 12px 15px; 
            gap: 10px; 
            border-top: 1px solid var(--border-color); 
            background-color: var(--secondary-bg); 
            align-items: flex-end; 
            transition: background-color 0.5s ease, border-color 0.5s ease; 
            flex-shrink: 0;
        }
        .message-input { 
            flex: 1; 
            border: 1px solid transparent; 
            border-radius: 24px; 
            padding: 12px 18px; 
            background-color: var(--primary-bg); 
            color: var(--text-primary); 
            resize: none; 
            outline: none; 
            max-height: 120px; 
            min-height: 46px; 
            transition: var(--transition); 
            font-weight: 500; 
            font-family: var(--font-family); 
            font-size: inherit;
        }
        .message-input:focus { 
            border-color: var(--accent-color); 
            background-color: var(--secondary-bg); 
        }
        html[data-theme="dark"] .message-input:focus { border-color: var(--accent-color-dark); }
        
        .input-buttons { 
            display: flex; 
            gap: 8px; 
        }
        .input-btn { 
            border: none; 
            border-radius: 50%; 
            width: 46px; 
            height: 46px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: var(--transition); 
            flex-shrink: 0; 
        }
        .input-btn:hover { transform: scale(1.08) rotate(5deg); filter: brightness(1.1); }
        
        .send-btn, .batch-btn.active { 
            background-color: var(--accent-color); 
            color: var(--message-sent-text); 
        }
        html[data-theme="dark"] .send-btn, html[data-theme="dark"] .batch-btn.active { 
            background-color: var(--accent-color-dark); 
        }
        /* --- 新增：硬币按钮样式 --- */
        .coin-btn, .batch-btn, .continue-btn, .attachment-btn { 
            background-color: var(--message-received-bg); 
            color: var(--text-secondary); 
        }
        .attachment-btn:hover, .continue-btn:hover, .batch-btn:hover, .coin-btn:hover { color: var(--text-primary); }
        
        body.with-background .header,
        body.with-background .input-area {
            background-color: rgba(var(--secondary-bg-rgb), 0.3);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        body.with-background .message-received { background-color: rgba(var(--secondary-bg-rgb), 0.95); }
        body.with-background .message-input { background-color: rgba(var(--primary-bg-rgb), 0.8); }
        body.with-background .message-input:focus { background-color: rgba(var(--secondary-bg-rgb), 0.9); }
        body.with-background .batch-preview {
            background-color: rgba(var(--secondary-bg-rgb), 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        body.with-background .message-meta { text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.6); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(8px); 
            animation: modalBgFadeIn 0.3s ease; 
        }
        @keyframes modalBgFadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { 
            background-color: var(--secondary-bg); 
            border-radius: var(--radius); 
            padding: 24px; 
            width: 90%; 
            max-width: 400px; 
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); 
            animation: modalContentSlideIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            transition: background-color 0.5s ease; 
            scrollbar-width: none;
            -ms-overflow-style: none;
            transform: translateY(20px) scale(0.95);
            opacity: 0;
            display: flex;
            flex-direction: column;
        }
        .modal-content::-webkit-scrollbar {
            display: none;
            width: 0;
        }
        @keyframes modalContentSlideIn { 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .modal-title { 
            font-size: 18px; 
            font-weight: 600; 
            margin-bottom: 16px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            transition: color 0.5s ease;
            flex-shrink: 0; 
        }
        .modal-title i { color: var(--accent-color); }
        html[data-theme="dark"] .modal-title i { color: var(--accent-color-dark); }
        .modal-input { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            background-color: var(--primary-bg); 
            color: var(--text-primary); 
            margin-bottom: 16px; 
            transition: var(--transition); 
            font-family: var(--font-family);
        }
        .modal-input:focus { border-color: var(--accent-color); transform: translateY(-1px); }
        html[data-theme="dark"] .modal-input:focus { border-color: var(--accent-color-dark); }
        .modal-buttons { 
            display: flex; 
            justify-content: flex-end; 
            gap: 12px;
            margin-top: 16px;
            flex-shrink: 0;
        }
        .modal-btn { 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: var(--transition); 
            font-family: var(--font-family);
        }
        .modal-btn-primary { 
            background-color: var(--accent-color); 
            color: var(--message-sent-text); 
        }
        html[data-theme="dark"] .modal-btn-primary { background-color: var(--accent-color-dark); }
        .modal-btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .modal-btn-secondary { 
            background-color: var(--message-received-bg); 
            color: var(--text-primary); 
        }
        .modal-btn-secondary:hover { background-color: var(--border-color); transform: translateY(-1px); }
        
        /* --- 新增：收藏夹列表样式 --- */
        #favorites-modal .modal-content {
            max-width: 500px;
        }
        .favorites-list {
            flex: 1;
            overflow-y: auto;
            margin: 0 -10px;
            padding: 0 10px;
        }
        .favorite-item {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeIn 0.3s ease;
        }
        .favorite-item:last-child {
            border-bottom: none;
        }
        .favorite-item-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .favorite-item-sender {
            font-weight: 600;
        }
        .favorite-item-content {
            line-height: 1.6;
        }
        .favorite-item-content img {
            max-width: 100px;
            border-radius: 8px;
            margin-top: 5px;
        }
        .no-favorites {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .no-favorites i {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }


        .file-input { display: none; }
        .typing-indicator, .empty-state { 
            position: absolute; 
            left: 20px; 
            bottom: 20px; 
            z-index: 5; 
        }
        .empty-state { 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-secondary); 
            text-align: center; 
            padding: 20px; 
            width: 100%; 
            transition: color 0.5s ease; 
        }
        .empty-state i { font-size: 64px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 16px; font-weight: 500; }
        
        .typing-indicator { 
            align-self: flex-start; 
            background-color: var(--message-received-bg); 
            padding: 12px 16px; 
            border-radius: var(--radius); 
            border-bottom-left-radius: 6px; 
            box-shadow: var(--shadow); 
            animation: fadeIn 0.4s ease-out; 
            display: none; 
            transition: background-color 0.5s ease, box-shadow 0.5s ease; 
        }
        .typing-dots { display: flex; gap: 5px; }
        .typing-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background-color: var(--text-secondary); 
            animation: typing 1.4s infinite ease-in-out both; 
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 
            0%, 80%, 100% { transform: scale(0); } 
            40% { transform: scale(1.0); } 
        }
        
        .settings-item-list { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            margin-bottom: 16px; 
        }
        .settings-item { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: var(--transition); 
        }
        .settings-item:hover { background-color: var(--primary-bg); transform: translateX(5px); }
        
        #my-status-input { 
            background: transparent; 
            border: none; 
            outline: none; 
            color: var(--text-primary); 
            font-size: 12px; 
            font-weight: 500; 
            font-family: var(--font-family); 
            text-align: center; 
            padding: 2px 6px; 
            width: 100px; 
        }
        
        .welcome-animation { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: var(--primary-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            animation: fadeOut 1.2s ease 2.5s forwards; 
            transition: background-color 0.5s ease; 
        }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        .welcome-logo { 
            font-size: 48px; 
            color: var(--accent-color); 
            margin-bottom: 20px; 
            animation: pulse 1.5s infinite, float 3s ease-in-out infinite; 
            transition: color 0.5s ease; 
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        html[data-theme="dark"] .welcome-logo { color: var(--accent-color-dark); }
        @keyframes pulse { 
            0% { transform: scale(1); } 
            50% { transform: scale(1.1); } 
            100% { transform: scale(1); } 
        }
        .welcome-text { 
            font-size: 28px; 
            font-weight: 600; 
            color: var(--text-primary); 
            margin-bottom: 10px; 
            transition: color 0.5s ease; 
            animation: textFadeIn 1s ease-out; 
        }
        @keyframes textFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .welcome-subtext { 
            font-size: 16px; 
            color: var(--text-secondary); 
            transition: color 0.5s ease; 
            animation: textFadeIn 1s ease-out 0.5s both; 
        }
        
        .batch-preview { 
            position: absolute; 
            bottom: 85px; 
            left: 15px; 
            right: 15px; 
            background-color: var(--secondary-bg); 
            border-radius: var(--radius); 
            padding: 12px; 
            box-shadow: var(--shadow); 
            display: none; 
            flex-direction: column; 
            gap: 8px; 
            max-height: 150px; 
            overflow-y: auto; 
            border: 1px solid var(--border-color); 
            z-index: 5; 
            transition: all 0.5s ease; 
            scrollbar-width: none;
            -ms-overflow-style: none;
            animation: batchPreviewSlideUp 0.3s ease;
        }
        .batch-preview::-webkit-scrollbar {
            display: none;
            width: 0;
        }
        @keyframes batchPreviewSlideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .batch-preview-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px 12px; 
            background-color: var(--primary-bg); 
            border-radius: 8px; 
            font-size: 14px; 
            transition: background-color 0.5s ease, opacity 0.3s ease; 
            user-select: none; 
            animation: batchItemAppear 0.2s ease;
        }
        @keyframes batchItemAppear {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .batch-preview-text { 
            flex-grow: 1; 
            cursor: text; 
            margin-right: 10px; 
        }
        .batch-preview-input { 
            flex-grow: 1; 
            border: none; 
            background-color: transparent; 
            border-bottom: 1px solid var(--accent-color); 
            color: var(--text-primary); 
            font-family: var(--font-family); 
            font-size: 14px; 
            outline: none; 
        }
        .batch-preview-remove { 
            background: none; 
            border: none; 
            color: var(--text-secondary); 
            cursor: pointer; 
            font-size: 12px; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            transition: var(--transition);
        }
        .batch-preview-remove:hover { 
            background-color: var(--border-color); 
            color: var(--text-primary); 
            transform: scale(1.1);
        }
        .batch-actions { 
            display: flex; 
            justify-content: flex-end; 
            gap: 8px; 
            margin-top: 8px; 
        }
        .batch-action-btn { 
            padding: 6px 12px; 
            border-radius: 6px; 
            border: none; 
            font-size: 12px; 
            cursor: pointer; 
            transition: var(--transition); 
            font-family: var(--font-family);
        }
        .batch-send-btn {

        .coin-toss-overlay {
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);

            justify-content: center;

            display: flex;
            opacity: 1;
        }

        .coin-container {
            perspective: 1000px; /* 产生3D效果的视距 */
        }

        .coin {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
        }

        .coin.flipping-heads {
            animation: flip-coin-heads 2.5s cubic-bezier(0.3, 0.1, 0.3, 1) forwards;
        }
        .coin.flipping-tails {
            animation: flip-coin-tails 2.5s cubic-bezier(0.3, 0.1, 0.3, 1) forwards;
        }

        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden; /* 隐藏元素背面 */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            font-family: var(--font-family);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .coin-front {
            background: linear-gradient(45deg, #ffd700, #f0c000);
            color: #4a3800;
        }

        .coin-back {
            background: linear-gradient(45deg, #c0c0c0, #a9a9a9);
            color: #333;
            transform: rotateY(180deg); /* 翻转背面 */
        }

        @keyframes flip-coin-common {
            0% { transform: rotateY(0) translateY(-150px) scale(0.8); animation-timing-function: ease-in; }
            15% { transform: rotateY(1080deg) translateY(0px) scale(1); }
            30% { transform: rotateY(2160deg) translateY(-80px) scale(0.9); animation-timing-function: ease-out; }
            55% { transform: rotateY(3960deg) translateY(0px) scale(1); animation-timing-function: ease-in; }
            75% { transform: rotateY(5400deg) translateY(-40px) scale(0.95); animation-timing-function: ease-out; }
        }

        @keyframes flip-coin-heads {
            from { @keyframes flip-coin-common; }
            0% { transform: rotateY(0) translateY(-150px) scale(0.8); animation-timing-function: ease-in; }
            15% { transform: rotateY(1080deg) translateY(0px) scale(1); }
            30% { transform: rotateY(2160deg) translateY(-80px) scale(0.9); animation-timing-function: ease-out; }
            55% { transform: rotateY(3960deg) translateY(0px) scale(1); animation-timing-function: ease-in; }
            75% { transform: rotateY(5400deg) translateY(-40px) scale(0.95); animation-timing-function: ease-out; }
            100% { transform: rotateY(7200deg) translateY(0) scale(1); } /* 最终落在正面 (360的倍数) */
        }
        @keyframes flip-coin-tails {
            0% { transform: rotateY(0) translateY(-150px) scale(0.8); animation-timing-function: ease-in; }
            15% { transform: rotateY(1080deg) translateY(0px) scale(1); }
            30% { transform: rotateY(2160deg) translateY(-80px) scale(0.9); animation-timing-function: ease-out; }
            55% { transform: rotateY(3960deg) translateY(0px) scale(1); animation-timing-function: ease-in; }
            75% { transform: rotateY(5400deg) translateY(-40px) scale(0.95); animation-timing-function: ease-out; }
            100% { transform: rotateY(7380deg) translateY(0) scale(1); } /* 最终落在背面 (7200 + 180) */
        }

            transform: translateY(20px);

        // 通知系统
        function showNotification(message, type = 'info', duration = 3000) {
            const existingNotification = document.querySelector('.notification');
            if(existingNotification) existingNotification.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            
            let icon = 'fas fa-info-circle';
            if (type === 'success') icon = 'fas fa-check-circle';
            if (type === 'warning') icon = 'fas fa-exclamation-triangle';
            if (type === 'error') icon = 'fas fa-exclamation-circle';
            
            notification.innerHTML = `<i class="${icon}"></i><span>${message}</span>`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('hiding');
                notification.addEventListener('animationend', () => notification.remove());
            }, duration);
        }

        // 音频播放
        const playSound = (type) => {
            if (!settings.soundEnabled) return;
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.type = 'sine';
                if (type === 'send') {
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                } else if (type === 'favorite') {
                    oscillator.frequency.setValueAtTime(1200, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.08, audioContext.currentTime);
                } else { // receive
                    oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                }
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.15);
                oscillator.stop(audioContext.currentTime + 0.15);
            } catch (e) { console.warn("音频播放失败:", e); }
        };

            }
            const savedMessages = localStorage.getItem('chatMessages');
            if (savedMessages) {
                try {
                    messages = JSON.parse(savedMessages).map(m => ({ 
                        ...m, 
                        timestamp: m.timestamp ? new Date(m.timestamp) : new Date(),
                        favorited: m.favorited || false // 兼容旧数据

            if (localStorage.getItem('myAvatar')) updateAvatar(DOMElements.me.avatar, localStorage.getItem('myAvatar'));
            const savedBackground = localStorage.getItem('chatBackground');
            if (savedBackground) applyBackground(savedBackground);
            updateUI();
        };

            const text = textOverride || DOMElements.messageInput.value.trim();

            DOMElements.messageInput.value = '';

            if (imageFile && imageFile.size > MAX_IMAGE_SIZE) { showNotification('图片大小不能超过5MB', 'error', 3000); DOMElements.imageInput.value = ''; return; }
            
            const createMessage = (imgSrc = null) => {
                addMessage({ id: Date.now(), sender: 'user', text: text || '', timestamp: new Date(), image: imgSrc, status: 'sent', favorited: false });
                playSound('send');
                if (!isBatchMode) setTimeout(simulateReply, 800 + Math.random() * 1200);

                const reader = new FileReader();

            DOMElements.batchBtn.title = isBatchMode ? "退出批量模式" : "批量发送模式";
            DOMElements.batchPreview.style.display = isBatchMode ? 'flex' : 'none';
            DOMElements.messageInput.placeholder = isBatchMode ? "我有很多话想说呢" : "要说点什么吗…？";
            if (isBatchMode) { batchMessages = []; updateBatchPreview(); }
        }
        
        function addToBatch() {
            const text = DOMElements.messageInput.value.trim();
            if (!text) return;
            batchMessages.push({ id: Date.now() + batchMessages.length, sender: 'user', text: text, timestamp: new Date(), status: 'sent', favorited: false });
            DOMElements.messageInput.value = ''; DOMElements.messageInput.style.height = '46px'; 
            updateBatchPreview();
        }
        
        function updateBatchPreview() {
            const previewContainer = DOMElements.batchPreview;
            previewContainer.innerHTML = '';
            const title = document.createElement('div');
            title.className = 'batch-preview-title';
            title.textContent = `我有很多的话想说…！`;
            previewContainer.appendChild(title);
            const list = document.createElement('div');
            list.className = 'batch-preview-list';
            if (batchMessages.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: var(--text-secondary); font-size: 14px; padding: 10px;">˚₊‧꒰𓆩 ♱ 𓆪꒱‧₊˚</div>';
            } else {
                batchMessages.forEach((msg, index) => {
                    const item = document.createElement('div'); item.className = 'batch-preview-item'; item.dataset.index = index;
                    const textSpan = document.createElement('span'); textSpan.className = 'batch-preview-text'; textSpan.textContent = msg.text;
                    const removeBtn = document.createElement('button'); removeBtn.className = 'batch-preview-remove'; removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                    item.append(textSpan, removeBtn);
                    list.appendChild(item);
                });
            }
            previewContainer.appendChild(list);
            const actions = document.createElement('div');
            actions.className = 'batch-actions';
            actions.innerHTML = `<button class="batch-action-btn batch-cancel-btn">取消</button><button class="batch-action-btn batch-send-btn">发送全部 (${batchMessages.length})</button>`;
            previewContainer.appendChild(actions);
            addBatchPreviewListeners();
        }

        function addBatchPreviewListeners() {
            DOMElements.batchPreview.querySelectorAll('.batch-preview-remove').forEach(btn => btn.addEventListener('click', (e) => {
                const index = e.currentTarget.closest('.batch-preview-item').dataset.index;
                batchMessages.splice(index, 1); updateBatchPreview();
            }));
            DOMElements.batchPreview.querySelector('.batch-send-btn').addEventListener('click', sendBatchMessages);
            DOMElements.batchPreview.querySelector('.batch-cancel-btn').addEventListener('click', () => { isBatchMode = false; DOMElements.batchBtn.classList.remove('active'); DOMElements.batchPreview.style.display = 'none'; DOMElements.messageInput.placeholder = "要说点什么吗…？"; batchMessages = []; });
        }
        
        function sendBatchMessages() {
            if (batchMessages.length === 0) return;
            showNotification(`正在发送 ${batchMessages.length} 条消息...`, 'info', 2000);
            batchMessages.forEach(msg => { addMessage(msg); playSound('send'); });
            setTimeout(simulateReply, 1000 + Math.random() * 2000);
            isBatchMode = false; batchMessages = [];
            DOMElements.batchBtn.classList.remove('active'); DOMElements.batchPreview.style.display = 'none';
            DOMElements.messageInput.placeholder = "要说点什么吗…？";
        }

        function simulateReply() {
            let changed = false;
            messages.forEach(msg => { if (msg.sender === 'user' && msg.status !== 'read') { msg.status = 'read'; changed = true; } });
            if(changed) { renderMessages(); setTimeout(saveData, 100); }
            if(settings.typingIndicatorEnabled) { DOMElements.typingIndicator.style.display = 'block'; DOMElements.chatContainer.scrollTop = DOMElements.chatContainer.scrollHeight; }
            const replyCount = Math.random() < 0.75 ? 1 : (Math.random() < 0.95 ? 2 : 3);
            let delay = 0;
            for (let i = 0; i < replyCount; i++) {
                delay += 1500 + Math.random() * 2000;
                setTimeout(() => {
                    const text = Math.random() < 0.15 ? REPLY_EMOJIS[Math.floor(Math.random() * REPLY_EMOJIS.length)] : REPLY_MESSAGES[Math.floor(Math.random() * REPLY_MESSAGES.length)];
                    addMessage({ id: Date.now() + i, sender: 'partner', text: text, timestamp: new Date(), favorited: false });
                    playSound('message');
                    if (i === replyCount - 1) DOMElements.typingIndicator.style.display = 'none';
                }, delay);
            }
        }
        
        
        // /*************************************************************************
        //  * ***** START: COIN TOSS ANIMATION MARKER (REPLACE IN SCRIPT) ***** *
        //  *************************************************************************/
        // --- 修改：抛硬币功能以包含动画 ---
        function handleCoinToss() {
            // 1. 预先决定结果
            const result = Math.random() < 0.5 ? '是' : '否';
            const animationClass = result === '是' ? 'flipping-heads' : 'flipping-tails';

            const overlay = DOMElements.coinTossOverlay;
            const coin = DOMElements.animatedCoin;
            const resultText = DOMElements.coinResultText;

            // 2. 准备并显示动画遮罩层
            resultText.style.opacity = '0';
            resultText.style.transform = 'translateY(20px)';
            coin.classList.remove('flipping-heads', 'flipping-tails'); // 清除上一次的动画类
            overlay.classList.add('visible');

            // 3. 触发动画
            // 使用 requestAnimationFrame 确保浏览器在下一帧渲染时应用动画类，避免动画失效
            requestAnimationFrame(() => {
                coin.classList.add(animationClass);
            });

            // 4. 定义动画结束后的行为
            const onAnimationEnd = () => {
                // 显示结果文字
                resultText.textContent = `是“${result}”`;
                resultText.style.opacity = '1';
                resultText.style.transform = 'translateY(0)';

                // 1.5秒后隐藏遮罩层并发送消息
                setTimeout(() => {
                    overlay.classList.remove('visible');
                    sendMessage(result);
                    showNotification(`硬币落下了，是“${result}”`, 'info', 2500);

                    // 清理工作
                    coin.classList.remove(animationClass);
                    coin.removeEventListener('animationend', onAnimationEnd);
                }, 1500);
            };

            // 5. 监听动画结束事件，{ once: true } 确保事件只触发一次
            coin.addEventListener('animationend', onAnimationEnd, { once: true });
        }
        // /***********************************************************************
        //  * ***** END: COIN TOSS ANIMATION MARKER (REPLACE IN SCRIPT) ***** *
        //  ***********************************************************************/


        // 新增：渲染收藏夹
        function renderFavorites() {
            const list = DOMElements.favoritesModal.list;
            list.innerHTML = '';
            const favoritedMessages = messages.filter(m => m.favorited).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            if (favoritedMessages.length === 0) {
                list.innerHTML = '<div class="no-favorites"><i class="far fa-star"></i><p>还没有收藏的消息</p></div>';
                return;
            }

            favoritedMessages.forEach(msg => {
                const item = document.createElement('div');
                item.className = 'favorite-item';
                let contentHTML = msg.text ? `<div>${msg.text.replace(/\n/g, '<br>')}</div>` : '';
                if (msg.image) {
                    contentHTML += `<img src="${msg.image}" alt="图片">`;
                }

                item.innerHTML = `
                    <div class="favorite-item-meta">
                        <span class="favorite-item-sender">${msg.sender === 'user' ? settings.myName : settings.partnerName}</span>
                        <span>${new Date(msg.timestamp).toLocaleString('zh-CN')}</span>
                    </div>
                    <div class="favorite-item-content">${contentHTML}</div>
                `;
                list.appendChild(item);
            });
        }


        function showModal(modalElement) {
            modalElement.style.display = 'flex';
            requestAnimationFrame(() => {
                const content = modalElement.querySelector('.modal-content');
                content.style.opacity = '1';
                content.style.transform = 'translateY(0) scale(1)';
            });
        }

        function hideModal(modalElement) {
            const content = modalElement.querySelector('.modal-content');
            content.style.opacity = '0';
            content.style.transform = 'translateY(20px) scale(0.95)';
            setTimeout(() => { modalElement.style.display = 'none'; }, 300);
        }

        function viewImage(src) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `<div class="modal-content" style="max-width: 90%; max-height: 90%; background: transparent; box-shadow: none; padding: 0;"><img src="${src}" style="max-width: 100%; max-height: 100%; border-radius: 8px; display: block;"><button class="modal-btn modal-btn-secondary" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); color: white; z-index: 1;">关闭</button></div>`;
            modal.querySelector('button').addEventListener('click', () => document.body.removeChild(modal));
            modal.addEventListener('click', (e) => { if (e.target === modal) document.body.removeChild(modal); });
            document.body.appendChild(modal);
        }

        function exportChatHistory() {
            try {
                const dataStr = JSON.stringify({ version: "1.1", exportDate: new Date().toISOString(), messages, settings }, null, 2);
                const dataBlob = new Blob([dataStr], {type: 'application/json;charset=utf-8'});
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                const dateStr = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
                link.download = `chat-backup-${dateStr}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
                showNotification(`成功导出 ${messages.length} 条消息`, 'success', 3000);
            } catch (error) { console.error('导出失败:', error); showNotification('导出失败，请重试', 'error', 3000); }
        }

        function importChatHistory(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!importedData.messages || !Array.isArray(importedData.messages)) throw new Error('无效的聊天记录文件');
                    if (messages.length > 0 && !confirm('导入将覆盖现有聊天记录，确定继续吗？')) return;
                    messages = importedData.messages.filter(m => m && typeof m.sender === 'string' && (m.text || m.image) && m.timestamp).map(m => ({ ...m, timestamp: new Date(m.timestamp), favorited: m.favorited || false }));
                    if (importedData.settings) Object.assign(settings, importedData.settings);
                    saveData(); updateUI();
                    showNotification(`成功导入 ${messages.length} 条消息`, 'success', 3000);
                } catch (error) { console.error('导入失败:', error); showNotification('文件格式错误', 'error', 4000); }
            };
            reader.onerror = () => showNotification('文件读取失败', 'error', 3000);
            reader.readAsText(file);
        }

        const checkStatusChange = () => {
            if ((Date.now() - settings.lastStatusChange) / 36e5 >= settings.nextStatusChange) {
                settings.partnerStatus = PARTNER_STATUSES[Math.floor(Math.random() * PARTNER_STATUSES.length)];
                settings.lastStatusChange = Date.now();
                settings.nextStatusChange = 1 + Math.random() * 7;
                DOMElements.partner.status.textContent = settings.partnerStatus; saveData();
            }
        };

        // --- 事件监听器 ---
        function setupEventListeners() {
            DOMElements.sendBtn.addEventListener('click', () => isBatchMode ? addToBatch() : sendMessage());
            DOMElements.messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); isBatchMode ? addToBatch() : sendMessage(); } });
            DOMElements.messageInput.addEventListener('input', () => { DOMElements.messageInput.style.height = 'auto'; DOMElements.messageInput.style.height = `${Math.min(DOMElements.messageInput.scrollHeight, 120)}px`; });
            DOMElements.attachmentBtn.addEventListener('click', () => DOMElements.imageInput.click());
            DOMElements.imageInput.addEventListener('change', () => { if (DOMElements.imageInput.files[0]) { if(isBatchMode) { showNotification('批量模式不支持图片', 'warning', 3000); DOMElements.imageInput.value=''; } else { sendMessage(); } } });
            DOMElements.continueBtn.addEventListener('click', simulateReply);
            DOMElements.batchBtn.addEventListener('click', toggleBatchMode);
            DOMElements.coinBtn.addEventListener('click', handleCoinToss); // 新增
            DOMElements.themeToggle.addEventListener('click', () => { settings.isDarkMode = !settings.isDarkMode; saveData(); updateUI(); showNotification(`已切换到${settings.isDarkMode ? '深色' : '浅色'}模式`, 'success', 2000); });
            
            // 收藏消息事件委托
            DOMElements.chatContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('favorite-btn')) {
                    const wrapper = e.target.closest('.message-wrapper');
                    const messageId = Number(wrapper.dataset.id);
                    const message = messages.find(m => m.id === messageId);
                    if (message) {
                        message.favorited = !message.favorited;
                        e.target.classList.toggle('favorited', message.favorited);
                        e.target.title = message.favorited ? "取消收藏" : "收藏消息";
                        showNotification(message.favorited ? '已收藏' : '已取消收藏', 'success', 1500);
                        playSound('favorite');
                        saveData();
                    }
                }
            });

            // 模态框事件
            const openNameModal = (isPartner) => {
                showModal(DOMElements.editModal.modal);
                DOMElements.editModal.title.textContent = isPartner ? `修改 ${settings.partnerName} 的昵称` : '修改我的昵称';
                DOMElements.editModal.input.value = isPartner ? settings.partnerName : settings.myName;
                DOMElements.editModal.input.focus();
                DOMElements.editModal.save.onclick = () => {
                    const newName = DOMElements.editModal.input.value.trim();
                    if(newName) { isPartner ? settings.partnerName = newName : settings.myName = newName; saveData(); updateUI(); showNotification('昵称已更新', 'success', 2000); }
                    hideModal(DOMElements.editModal.modal);
                };
            };
            const openAvatarModal = (isPartner) => {
                showModal(DOMElements.avatarModal.modal);
                DOMElements.avatarModal.title.textContent = isPartner ? '上传对方头像' : '上传我的头像';
                DOMElements.avatarModal.input.value = '';
                DOMElements.avatarModal.save.onclick = () => {
                    if(DOMElements.avatarModal.input.files[0]) {
                        const file = DOMElements.avatarModal.input.files[0];
                        if (file.size > MAX_AVATAR_SIZE) { showNotification('头像图片不能超过2MB', 'error', 3000); return; }
                        const reader = new FileReader();
                        reader.onload = e => { updateAvatar(isPartner ? DOMElements.partner.avatar : DOMElements.me.avatar, e.target.result); saveData(); showNotification('头像已更新', 'success', 2000); };
                        reader.onerror = () => showNotification('头像上传失败', 'error', 3000);
                        reader.readAsDataURL(file);
                    }
                    hideModal(DOMElements.avatarModal.modal);
                }
            };
            DOMElements.partner.name.addEventListener('click', () => openNameModal(true));
            DOMElements.me.name.addEventListener('click', () => openNameModal(false));
            DOMElements.partner.avatar.addEventListener('click', () => openAvatarModal(true));
            DOMElements.me.avatar.addEventListener('click', () => openAvatarModal(false));
            DOMElements.editModal.cancel.addEventListener('click', () => hideModal(DOMElements.editModal.modal));
            DOMElements.avatarModal.cancel.addEventListener('click', () => hideModal(DOMElements.avatarModal.modal));
            DOMElements.me.statusContainer.addEventListener('click', () => {
                const statusTextElement = DOMElements.me.statusText; const statusContainer = DOMElements.me.statusContainer; const currentStatus = statusTextElement.textContent;
                const input = document.createElement('input'); input.type = 'text'; input.id = 'my-status-input'; input.value = currentStatus;
                const saveStatus = () => { settings.myStatus = input.value.trim() || "在线"; statusTextElement.textContent = settings.myStatus; statusContainer.innerHTML = ''; statusContainer.appendChild(statusTextElement); saveData(); showNotification('状态已更新', 'success', 2000); };
                input.addEventListener('blur', saveStatus);
                input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); });
                statusContainer.innerHTML = ''; statusContainer.appendChild(input); input.focus();
            });

            // 设置与收藏夹模态框
            DOMElements.settingsModal.settingsBtn.addEventListener('click', () => { updateSettingsModalUI(); showModal(DOMElements.settingsModal.modal); });
            DOMElements.settingsModal.cancel.addEventListener('click', () => hideModal(DOMElements.settingsModal.modal));
            DOMElements.favoritesModal.favoritesBtn.addEventListener('click', () => { renderFavorites(); showModal(DOMElements.favoritesModal.modal); }); // 新增
            DOMElements.favoritesModal.cancel.addEventListener('click', () => hideModal(DOMElements.favoritesModal.modal)); // 新增

            DOMElements.settingsModal.soundToggle.addEventListener('click', () => { settings.soundEnabled = !settings.soundEnabled; saveData(); updateSettingsModalUI(); showNotification(`消息音效已${settings.soundEnabled ? '开启' : '关闭'}`, 'success', 2000); });
            DOMElements.settingsModal.readReceiptsToggle.addEventListener('click', () => { settings.readReceiptsEnabled = !settings.readReceiptsEnabled; saveData(); updateSettingsModalUI(); renderMessages(); showNotification(`已读回执已${settings.readReceiptsEnabled ? '开启' : '关闭'}`, 'success', 2000); });
            DOMElements.settingsModal.typingIndicatorToggle.addEventListener('click', () => { settings.typingIndicatorEnabled = !settings.typingIndicatorEnabled; saveData(); updateSettingsModalUI(); showNotification(`"正在输入"指示器已${settings.typingIndicatorEnabled ? '显示' : '隐藏'}`, 'success', 2000); });
            DOMElements.settingsModal.clearChat.addEventListener('click', () => { if(confirm("确定要清空所有聊天记录吗？此操作不可恢复。")) { messages = []; saveData(); renderMessages(); hideModal(DOMElements.settingsModal.modal); showNotification('聊天记录已清空', 'success', 2000); } });
            DOMElements.settingsModal.clearStorage.addEventListener('click', () => { if(confirm("【高危操作】确定要重置所有设置和聊天记录吗？此操作将清除所有本地数据且无法恢复。")) { localStorage.clear(); showNotification('所有数据已重置，页面即将刷新', 'info', 2000); setTimeout(() => location.reload(), 2000); } });
            
            DOMElements.settingsModal.themeColorBtns.forEach(btn => btn.addEventListener('click', () => { const newTheme = btn.dataset.theme; if (newTheme !== settings.colorTheme) { settings.colorTheme = newTheme; saveData(); updateUI(); showNotification(`主题颜色已切换`, 'success', 2000); } }));
            DOMElements.settingsModal.setBackground.addEventListener('click', () => DOMElements.backgroundInput.click());
            DOMElements.settingsModal.removeBackground.addEventListener('click', () => { if (localStorage.getItem('chatBackground')) removeBackground(); else showNotification('当前没有设置背景图片', 'info', 2000); });
            DOMElements.settingsModal.fontSizeSlider.addEventListener('input', (e) => { const fontSize = parseInt(e.target.value); settings.fontSize = fontSize; document.documentElement.style.setProperty('--font-size', `${fontSize}px`); DOMElements.settingsModal.fontSizeValue.textContent = `${fontSize}px`; saveData(); });
            DOMElements.backgroundInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (!file) return; if (file.size > MAX_IMAGE_SIZE) { showNotification('背景图片不能超过5MB', 'error', 3000); return; } const reader = new FileReader(); reader.onload = (event) => { try { localStorage.setItem('chatBackground', event.target.result); applyBackground(event.target.result); showNotification('背景图片已设置', 'success', 2000); } catch (error) { showNotification('图片太大无法保存，请选择一张小于5MB的图片。', 'error', 4000); removeBackground(); } }; reader.onerror = () => showNotification('背景图片读取失败', 'error', 3000); reader.readAsDataURL(file); hideModal(DOMElements.settingsModal.modal); });

            // 导入导出
            document.getElementById('export-chat').addEventListener('click', exportChatHistory);
            document.getElementById('import-chat').addEventListener('click', () => DOMElements.importInput.click());
            DOMElements.importInput.addEventListener('change', (e) => { if (e.target.files[0]) { importChatHistory(e.target.files[0]); e.target.value = ''; } });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setupEventListeners();
            setInterval(checkStatusChange, 60000);
            setTimeout(() => { 
                DOMElements.welcomeAnimation.style.display = 'none'; 
                if (messages.length === 0) showNotification('欢迎使用传讯', 'info', 3000);
            }, 3000);
        });
    </script>
</body>
</html>
